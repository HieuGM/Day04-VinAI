tools:
  # ---------------- Core tools ----------------
  - name: clarify
    description: "Ask the user one concise follow-up question when a required input is missing, ambiguous, or a send/post/publish action needs explicit confirmation. Use response_type=yes_no for action confirmation before Telegram, Discord, email, or publishing; do not use text for that confirmation boundary. Do not use this for meta or out-of-scope questions."
    parameters:
      type: object
      properties:
        question:
          type: string
          default: ""
          description: "The single question to ask the user."
        response_type:
          type: string
          enum: [text, yes_no, choice]
          default: "text"
          description: "Use text for missing URLs/accounts/topics, yes_no for confirmation before sending or publishing, and choice only when explicit options are useful."
        options:
          type: array
          default: []
          items: {type: string}
          description: "Optional choices when response_type is choice."
      required: [question, response_type]

  - name: timeline
    description: "Get recent posts/tweets FROM one specific final account or named person. Use for requests like 'tweets by Sam Altman' or 'latest posts from Elon Musk'. Requires a real screenname; ask clarify only if the account/person is missing, not merely because count is missing. Never default to Sam Altman/sama, Elon Musk/elonmusk, or any famous account when the user did not name an account. Known mappings: Sam Altman=sama, Elon Musk=elonmusk, Andrej Karpathy=karpathy. If a multi-turn correction replaces the account, call this tool exactly once for the last corrected account only; never also call it for the earlier account."
    parameters:
      type: object
      properties:
        screenname:
          type: string
          default: ""
          description: "Account handle without @, for example sama, elonmusk, or karpathy."
        limit:
          type: integer
          default: 5
          description: "Number of posts to retrieve. Copy the user's requested count when present."
      required: [screenname]

  - name: social_search
    description: "Search social/X posts ABOUT a topic, keyword, hashtag, company, or event. Use this instead of timeline when the user asks what people are saying about a topic. Do not call this if the latest user instruction says to drop Twitter/X/social or switch to web/news only. Use search_type=Top for top/popular/pho bien/most discussed; otherwise Latest."
    parameters:
      type: object
      properties:
        query:
          type: string
          default: ""
          description: "Topic or keywords to search for."
        search_type:
          type: string
          enum: [Latest, Top]
          default: "Latest"
          description: "Latest for recent posts; Top for popular/top/pho bien posts."
        limit:
          type: integer
          default: 5
          description: "Number of posts to return. Copy the user's requested count when present."
      required: [query]

  - name: lookup
    description: "Search the live web. Use topic=news for news/current events/tin/hom nay/moi nhat, and when the latest instruction says to switch from Twitter/social to web/news. In multi-turn corrections like 'chuyen sang X' or 'doi sang X', use X as the query and discard the earlier topic. Use topic=general for general web research. Map hom nay/today=day, tuan nay/this week=week, thang nay/month=month, nam nay/year=year."
    parameters:
      type: object
      properties:
        query:
          type: string
          default: ""
          description: "Search query, usually the core topic only. Strip labels like topic, chu de, about, ve, or tim kiem."
        topic:
          type: string
          enum: [general, news]
          default: "general"
          description: "Use news for current/news requests; general otherwise."
        timeframe:
          type: string
          enum: [day, week, month, year]
          default: "week"
          description: "Time range for news/current searches."
        max_results:
          type: integer
          default: 5
          description: "Maximum number of results. Copy the user's requested count when present."
      required: [query]

  - name: fetch
    description: "Read or summarize the content at an explicit URL provided by the user. Do not guess URLs. If the user says 'this article/link' without a URL, use clarify instead."
    parameters:
      type: object
      properties:
        url:
          type: string
          default: ""
          description: "The exact URL provided by the user."
      required: [url]

  - name: format
    description: "Format already available research items into markdown. Use only when the user asks to format/digest/rewrite items that are already known; this tool does not retrieve new data."
    parameters:
      type: object
      properties:
        items:
          type: array
          default: []
          description: "Research items that are already available."
          items:
            type: object
            properties:
              title: {type: string}
              url: {type: string}
              source: {type: string}
              summary: {type: string}
              section: {type: string}
        template:
          type: string
          enum: [brief, sections, bullets, thread, daily_ai_vn]
          default: "sections"
          description: "Output style."
        headline:
          type: string
          default: ""
          description: "Optional headline."
      required: [items, template]

  # ---------------- Bonus tools ----------------
  - name: send
    description: "Send text to the configured Telegram channel. This has a side effect. Call only when the conversation already includes an explicit yes/confirmation to send/post/publish the specific text; otherwise call clarify with response_type=yes_no."
    parameters:
      type: object
      properties:
        text:
          type: string
          default: ""
          description: "Text to send."
        confirmed:
          type: boolean
          default: false
          description: "Must be true only after explicit user confirmation."
      required: [text, confirmed]

  - name: policy
    description: "Search the local company policy knowledge base. Use for internal policy, data privacy, citation/source, AI research, external publishing, or tool usage policy questions."
    parameters:
      type: object
      properties:
        query:
          type: string
          default: ""
          description: "Policy question or keywords."
        policy_area:
          type: string
          enum: [all, ai_research, source_citation, data_privacy, external_publishing, tool_usage]
          default: "all"
          description: "Policy area to search."
        top_k:
          type: integer
          default: 3
          description: "Number of matching snippets."
      required: [query]

  - name: papers
    description: "Search arXiv for academic papers. Use for requests asking to find papers, research papers, surveys, preprints, or arXiv results."
    parameters:
      type: object
      properties:
        query:
          type: string
          default: ""
          description: "Academic search query."
        max_results:
          type: integer
          default: 5
          description: "Number of papers to return."
        sort_by:
          type: string
          enum: [relevance, lastUpdatedDate, submittedDate]
          default: "relevance"
          description: "Sort order."
      required: [query]

  - name: paper_text
    description: "Download an arXiv PDF and extract local text. Use when the user provides an arXiv ID or URL and asks to read, extract, or summarize the paper itself."
    parameters:
      type: object
      properties:
        arxiv_url:
          type: string
          default: ""
          description: "arXiv ID or URL."
        max_pages:
          type: integer
          default: 5
          description: "Maximum pages to extract."
        max_chars:
          type: integer
          default: 8000
          description: "Maximum characters to return."
      required: [arxiv_url]

  - name: query_expand
    description: "Create local search keywords/query variants for a topic. Use only when the user explicitly asks for keyword ideas, query variants, or a search plan; this tool does not fetch live results."
    parameters:
      type: object
      properties:
        topic:
          type: string
          default: ""
          description: "Core topic to create search queries for. Strip labels like topic, chu de, about, ve, or tim kiem."
        intent:
          type: string
          enum: [general, news, academic, social, policy]
          default: "general"
          description: "Research intent for the variants."
        language:
          type: string
          enum: [en, vi]
          default: "en"
          description: "Language of the generated query variants."
        max_variants:
          type: integer
          default: 5
          description: "Number of variants to generate."
      required: [topic]

  - name: github_search
    description: "Search GitHub repositories, issues, or users through the GitHub Search API. Use for GitHub repo/library discovery, issue/PR research, project comparisons, or finding GitHub accounts. Optional GITHUB_TOKEN improves rate limits."
    parameters:
      type: object
      properties:
        query:
          type: string
          default: ""
          description: "GitHub search query."
        search_type:
          type: string
          enum: [repositories, issues, users]
          default: "repositories"
          description: "Use repositories for repos/libraries, issues for issues or PR-like research, users for GitHub accounts."
        max_results:
          type: integer
          default: 5
          description: "Number of results to return."
        sort:
          type: string
          enum: [best_match, stars, forks, updated, comments, created]
          default: "best_match"
          description: "Optional GitHub sort. Use best_match unless the user asks for stars/forks/recent/etc."
      required: [query]

  - name: hn_search
    description: "Search Hacker News stories or comments through the public Algolia HN API. Use when the user asks for Hacker News/HN discussions, stories, reactions, or comments about a topic."
    parameters:
      type: object
      properties:
        query:
          type: string
          default: ""
          description: "Topic to search on Hacker News."
        search_type:
          type: string
          enum: [story, comment, all]
          default: "story"
          description: "Use story for submissions, comment for comments, all for both."
        max_results:
          type: integer
          default: 5
          description: "Number of HN results."
      required: [query, search_type]

  - name: wikipedia_summary
    description: "Fetch a Wikipedia summary for an entity, concept, company, person, technology, or background topic. Use for encyclopedia-style context, not for latest news."
    parameters:
      type: object
      properties:
        query:
          type: string
          default: ""
          description: "Wikipedia search query or page title."
        language:
          type: string
          enum: [en, vi]
          default: "en"
          description: "Wikipedia language."
        max_chars:
          type: integer
          default: 1200
          description: "Maximum summary characters."
      required: [query]

  - name: rss_read
    description: "Read an explicit RSS or Atom feed URL and return recent entries. Use for feed URLs ending in rss/xml/atom or when the user explicitly asks to read an RSS/feed. If no feed URL is provided, use clarify."
    parameters:
      type: object
      properties:
        feed_url:
          type: string
          default: ""
          description: "The exact RSS/Atom feed URL."
        max_items:
          type: integer
          default: 5
          description: "Number of feed entries to return."
      required: [feed_url]

  - name: discord_send
    description: "Send text to a Discord channel via DISCORD_WEBHOOK_URL. This is a side-effect action. Call only after explicit user confirmation; otherwise call clarify with response_type=yes_no."
    parameters:
      type: object
      properties:
        text:
          type: string
          default: ""
          description: "Message text to send to Discord."
        username:
          type: string
          default: ""
          description: "Optional webhook display username."
        confirmed:
          type: boolean
          default: false
          description: "Must be true only after explicit user confirmation."
      required: [text, confirmed]

  - name: email_send
    description: "Send an already prepared email through Resend using RESEND_API and RESEND_FROM. This is a side-effect action. Use for email delivery, including AI news digests after the news text has been prepared. Call only after explicit user confirmation; otherwise call clarify with response_type=yes_no. If recipient, subject, or email body is missing, call clarify with response_type=text."
    parameters:
      type: object
      properties:
        to:
          type: array
          default: []
          items: {type: string}
          description: "Recipient email addresses."
        subject:
          type: string
          default: ""
          description: "Email subject."
        text:
          type: string
          default: ""
          description: "Plain text email body. Include the prepared AI news digest or message to send."
        html:
          type: string
          default: ""
          description: "Optional HTML email body."
        confirmed:
          type: boolean
          default: false
          description: "Must be true only after explicit user confirmation."
      required: [to, subject, text, confirmed]
